                            <select id="switch-status">

                                <option value="side">Side track</option>
                            </select>
                        </div>
                        <p>Location: Station</p>
                    </article>
                    <article class="c-info__card">

                        <label for="level-status">Status:</label>
                        <select id="level-status">
                            <option value="closed">Closed</option>
                            <option value="open">Open</option>
                        </select>
                        <p>Location: x</p>
                    </article>
                    <article class="c-info__card">
                        <h3>Signal 1</h3>
                        <label for="signal-status">Status:</label>
                        <select id="signal-status" class="c-dropdown">
                            <option value="red">🔴 Red</option>
                            <option value="orange">🟠 Orange</option>
                            <option value="green">🟢 Green</option>
                        </select>
                        <p>Location: x</p>
                    </article>
